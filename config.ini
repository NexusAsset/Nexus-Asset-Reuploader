# Asset Reuploader config
# Port the local helper listens on (the Studio plugin must use the same port).
port=38073
# File holding your Roblox Open Cloud API key (asset:write + asset:read + asset-permissions:write).
# This file is gitignored. NEVER share or commit it; regenerate it in Creator Hub if exposed.
apikey_file=apikey.txt
# Optional - only needed to reupload AUDIO (download its .ogg). Animations don't use it.
# Your .ROBLOSECURITY token. Gitignored; regenerate if exposed.
cookie_file=cookie.txt
# Optional - the Nexus known-places backend. When set, the helper asks it for places
# that can serve an asset (beyond the creator's own games) and reports verified hits
# back so every user benefits. Leave blank to use creator-games-only fetching.
knownplaces_url=
knownplaces_key=
